version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_PATH=/data/taskflow.db
      - JWT_SECRET=change-me-in-production
    volumes:
      - taskflow-data:/data

volumes:
  taskflow-data:
